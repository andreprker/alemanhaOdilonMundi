<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Alemanha - Odilon Mundi</title><style>body{font-family:Arial;text-align:center;background:#222;color:white;padding:30px}button{padding:12px;margin:8px;border-radius:8px}</style></head><body><h1>🇩🇪 Alemanha: Uma Viagem pelo Tempo</h1><div id="app"></div><script>let q=[['Quem eram os povos germânicos?',['Grupos da Europa Central','Povos americanos'],0],['Ano da unificação alemã?',['1871','1945'],0],['Queda do Muro de Berlim?',['1989','1961'],0]];let i=0,p=0;function show(){if(i==q.length){document.body.innerHTML='<h1>🏆 Mestre da História Alemã</h1><h2>Pontos: '+p+'</h2>';return}let x=q[i];app.innerHTML='<h2>'+x[0]+'</h2>'+x[1].map((a,n)=>'<button onclick="ans('+n+')">'+a+'</button>').join('')}function ans(n){if(n==q[i][2])p+=100;i++;show()}show()</script></body></html>
